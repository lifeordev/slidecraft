name: Release

# Push a tag like v0.1.0 to build and publish installers for macOS + Windows.
# You can also run it manually from the Actions tab (workflow_dispatch).
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            name: macOS (Apple Silicon)
            args: --mac
          - os: macos-13
            name: macOS (Intel)
            args: --mac
          - os: windows-latest
            name: Windows
            args: --win

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build app bundles
        run: npm run build

      - name: Package & publish
        run: npx electron-builder ${{ matrix.args }} --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Don't attempt macOS code signing in CI (unsigned builds).
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
